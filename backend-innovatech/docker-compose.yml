version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: backend-innovatech:latest
    container_name: backend-app
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DB_HOST=${DB_HOST}
      - DB_PORT=3306
      - DB_NAME=innovatech
      - DB_USER=root
      - DB_PASSWORD=mysql123
    restart: unless-stopped

volumes:
  db-data:
    driver: local
