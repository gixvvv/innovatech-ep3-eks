apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-innovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-innovatech
  template:
    metadata:
      labels:
        app: backend-innovatech
    spec:
      containers:
        - name: backend-innovatech
          image: 159773920634.dkr.ecr.us-east-1.amazonaws.com/backend-innovatech:latest
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: DB_HOST
              value: "database-service"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "innovatech"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "mysql123"
